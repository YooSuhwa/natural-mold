services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moldy
      POSTGRES_PASSWORD: moldy
      POSTGRES_DB: moldy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moldy"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Run migrations before serving so a fresh database has its tables before
    # the lifespan seed queries them (there is no create_all — Alembic owns the
    # schema). `alembic upgrade head` is idempotent, so this is safe on restart.
    command:
      - sh
      - -c
      - uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      # Point at the `postgres` service, not localhost — these override whatever
      # backend/.env sets for local (uv) development.
      DATABASE_URL: postgresql+asyncpg://moldy:moldy@postgres:5432/moldy
      DATABASE_URL_SYNC: postgresql://moldy:moldy@postgres:5432/moldy
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    # Secrets (ENCRYPTION_KEYS, JWT_SECRET, optional LLM keys) are read from
    # backend/.env — the same file the local-dev workflow creates. Marked
    # optional so `docker compose up postgres -d` keeps working before the
    # file exists. The environment block above takes precedence over it.
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      # Persist skills, uploads, artifacts, and agent images across recreation.
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is inlined into the browser bundle at build time, so the
        # API URL must be set HERE — a runtime env var alone never reaches the
        # client. Override for remote deploys, e.g. https://api.example.com
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    environment:
      # Runtime value for server-side (SSR) fetches; the client bundle uses the
      # build arg above.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8001}
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
