name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      # --all-extras: ruff lives in [project.optional-dependencies].dev,
      # not in the default dev dependency-group.
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check .
      # Test suite runs on aiosqlite in-memory — no Postgres service needed.
      # tests/integration/ drives background run workers via asyncio timing;
      # under xdist -n 4 on a 2-core runner those tasks starve and the poll
      # times out (flaky). Run the parallel suite without them, then the
      # integration ones serially. (test_m9_pg_roundtrip carries the
      # `integration` marker, so addopts `-m 'not integration'` still skips it.)
      - run: uv run --with pytest-xdist pytest -q -n 4 --ignore=tests/integration
      - run: uv run pytest -q tests/integration

  # pyright reports ~968 pre-existing errors (basic mode) as of 2026-07, so
  # this job is observability-only (always green, error count in the log)
  # until the backlog is burned down — drop the `|| true` once
  # `uv run pyright` is clean. Tracked in docs/refactoring-plan-2026-07.md
  # (IX-1).
  backend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen --all-extras
      - name: pyright (non-blocking backlog)
        run: uv run pyright || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      # Workspace install must run from the repo root (single lockfile).
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm lint
      # Custom guards (docs/lint-hardening-plan.md §A) — only the green ones
      # are wired as hard gates. lint:a11y and lint:design-system still carry
      # real violations that need component fixes (tracked as A-2 / FE-D2 /
      # FE-D4); wire them here once they are green.
      - run: pnpm lint:i18n
      - run: pnpm lint:type-safety
      - run: pnpm lint:e2e-hygiene
      - run: pnpm lint:frontend-architecture
      - run: pnpm exec vitest run
      - run: pnpm build
